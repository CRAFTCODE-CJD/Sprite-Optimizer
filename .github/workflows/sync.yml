name: Sync Docs to Website

on:
  push:
    branches:
      - main
    paths:
      - 'README.md' # Скрипт запустится, только если ты обновил README
      # - 'images/**' # Раскомментируй эту строку, если у тебя будет папка с картинками

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем репозиторий плагина (откуда берем текст)
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          path: source-repo

      # 2. Скачиваем репозиторий сайта (куда кладем текст)
      - name: Checkout Target Repo
        uses: actions/checkout@v4
        with:
          repository: CRAFTCODE-CJD/craftcode-site
          token: ${{ secrets.SYNC_DOCS_TOKEN }}
          path: target-repo

      # 3. Копируем файлы и отправляем на сайт
      - name: Copy files and Push
        run: |
          # Создаем папку для этого плагина на сайте, если её нет
          mkdir -p target-repo/src/content/docs/Sprite-Optimizer
          
          # Копируем README.md с переименованием в index.md (чтобы Astro Starlight правильно его понял)
          cp source-repo/README.md target-repo/src/content/docs/Sprite-Optimizer/index.md
          
          # Переходим в репозиторий сайта
          cd target-repo
          
          # Настраиваем Git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Добавляем скопированные файлы
          git add src/content/docs/Sprite-Optimizer/
          
          # Проверяем, есть ли изменения. Если есть - коммитим и пушим
          if git diff-index --quiet HEAD --; then
            echo "Нет новых изменений для сайта"
          else
            git commit -m "Авто-обновление документации: Sprite-Optimizer"
            git push origin main
          fi
